AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Reusable inbound email gateway. Receives emails via SES, parses them,
  strips quoted replies, and POSTs JSON payloads to configured webhook URLs.

Parameters:
  DomainConfig:
    Type: String
    Description: >
      JSON mapping of domain to webhook config.
      Example: {"letterclub.org": {"webhook_url": "https://...", "signing_secret": "..."}}

Globals:
  Function:
    Timeout: 60
    MemorySize: 256
    Runtime: python3.13

Resources:
  IncomingEmailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-incoming-emails"
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: emails/
            Topic: !Ref EmailNotificationTopic
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldEmails
            Status: Enabled
            ExpirationInDays: 7

  IncomingEmailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref IncomingEmailBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSESPut
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${IncomingEmailBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceAccount": !Ref "AWS::AccountId"

  AttachmentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-attachments"
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldAttachments
            Status: Enabled
            ExpirationInDays: 7

  EmailNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AWS::StackName}-email-notifications"

  EmailNotificationTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref EmailNotificationTopic
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSESPublish
            Effect: Allow
            Principal:
              Service: ses.amazonaws.com
            Action: sns:Publish
            Resource: !Ref EmailNotificationTopic
            Condition:
              StringEquals:
                "AWS:SourceAccount": !Ref "AWS::AccountId"
          - Sid: AllowS3Publish
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref EmailNotificationTopic
            Condition:
              ArnLike:
                "aws:SourceArn": !GetAtt IncomingEmailBucket.Arn

  SendingConfigurationSet:
    Type: AWS::SES::ConfigurationSet
    Properties:
      Name: !Sub "${AWS::StackName}-sending"

  BounceComplaintEventDestination:
    Type: AWS::SES::ConfigurationSetEventDestination
    Properties:
      ConfigurationSetName: !Ref SendingConfigurationSet
      EventDestination:
        Name: bounce-complaint-to-sns
        Enabled: true
        MatchingEventTypes:
          - bounce
          - complaint
        SnsDestination:
          TopicARN: !Ref EmailNotificationTopic

  EmailDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-email-dlq"
      MessageRetentionPeriod: 1209600  # 14 days

  EmailQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${AWS::StackName}-email-queue"
      VisibilityTimeout: 300  # 5 minutes
      MessageRetentionPeriod: 86400  # 1 day
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt EmailDeadLetterQueue.Arn
        maxReceiveCount: 3

  EmailQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref EmailQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSNSPublish
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt EmailQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref EmailNotificationTopic

  EmailQueueSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt EmailQueue.Arn
      TopicArn: !Ref EmailNotificationTopic
      RawMessageDelivery: false

  InboundEmailFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: handler.lambda_handler
      Environment:
        Variables:
          DOMAIN_CONFIG: !Ref DomainConfig
          ATTACHMENT_BUCKET: !Ref AttachmentBucket
          CONFIGURATION_SET_NAME: !Ref SendingConfigurationSet
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref IncomingEmailBucket
        - S3CrudPolicy:
            BucketName: !Ref AttachmentBucket
        - Statement:
            - Effect: Allow
              Action:
                - ses:SendRawEmail
              Resource: "*"
      Events:
        EmailQueue:
          Type: SQS
          Properties:
            Queue: !GetAtt EmailQueue.Arn
            BatchSize: 1

Outputs:
  IncomingEmailBucketName:
    Description: S3 bucket for raw incoming emails (configure in SES receipt rule)
    Value: !Ref IncomingEmailBucket

  EmailNotificationTopicArn:
    Description: SNS topic ARN (configure in SES receipt rule)
    Value: !Ref EmailNotificationTopic

  AttachmentBucketName:
    Description: S3 bucket for uploaded attachments
    Value: !Ref AttachmentBucket

  EmailQueueUrl:
    Description: SQS queue URL for email processing
    Value: !Ref EmailQueue

  EmailDeadLetterQueueUrl:
    Description: DLQ URL for failed email processing
    Value: !Ref EmailDeadLetterQueue

  FunctionArn:
    Description: Lambda function ARN
    Value: !GetAtt InboundEmailFunction.Arn

  SendingConfigurationSetName:
    Description: SES Configuration Set for tracking bounces and complaints
    Value: !Ref SendingConfigurationSet
